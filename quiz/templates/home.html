{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}

<h2 class="mb-4">Available Quizzes</h2>
<div class="list-group">
  {% for quiz in quizzes %}
    <a href="{% url 'quiz' quiz.id %}" class="list-group-item list-group-item-action">
      {{ quiz.title }}
    </a>
  {% empty %}
    <p>No quizzes found. Please add some in admin panel.</p>
  {% endfor %}
</div>

{% endblock %}
